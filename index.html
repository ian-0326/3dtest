<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chibi Angel 3D Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 35%, #273873 0%, #11182f 55%, #090d19 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .hud {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 5;
      color: #fff;
      background: rgba(8, 12, 26, 0.45);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 320px;
      line-height: 1.5;
    }
    .hud h1 {
      margin: 0 0 6px;
      font-size: 16px;
    }
    .hud p {
      margin: 0;
      font-size: 13px;
      opacity: 0.9;
    }
    .hint {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 5;
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      letter-spacing: 0.04em;
      background: rgba(8, 12, 26, 0.38);
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <h1>Q版天使角色 3D 嘗試版</h1>
      <p>這是依照你提供的角色做的「可拖曳旋轉」立體原型。重點是先驗證：角色能不能在網頁中以真正 3D 的方式呈現與轉向。</p>
    </div>
    <div class="hint">左右拖曳可旋轉 · 滾輪可縮放 · 手機可單指旋轉</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';

    const container = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x11182f, 10, 22);

    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.3, 8.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.enableDamping = true;
    controls.minDistance = 5.3;
    controls.maxDistance = 11;
    controls.minPolarAngle = Math.PI * 0.27;
    controls.maxPolarAngle = Math.PI * 0.73;
    controls.target.set(0, 1.2, 0);

    const ambient = new THREE.HemisphereLight(0xffffff, 0x35508f, 1.35);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 2.2);
    key.position.set(4, 7, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 0.1;
    key.shadow.camera.far = 30;
    key.shadow.camera.left = -8;
    key.shadow.camera.right = 8;
    key.shadow.camera.top = 8;
    key.shadow.camera.bottom = -8;
    scene.add(key);

    const rim = new THREE.DirectionalLight(0xffe8a8, 1.3);
    rim.position.set(-5, 4, -5);
    scene.add(rim);

    const fill = new THREE.PointLight(0x7ea8ff, 15, 20, 2);
    fill.position.set(0, 3, -4);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(10, 80),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2.5;
    ground.receiveShadow = true;
    scene.add(ground);

    function mat(color, roughness = 0.52, metalness = 0.05) {
      return new THREE.MeshStandardMaterial({ color, roughness, metalness });
    }

    const skinMat = mat(0xffdfc3, 0.72, 0.02);
    const goldMat = mat(0xf2c437, 0.38, 0.42);
    const whiteMat = mat(0xf7f8ff, 0.8, 0.02);
    const blackMat = mat(0x191919, 0.7, 0.02);
    const blueMat = mat(0x3f8fff, 0.3, 0.18);
    const hairMat = mat(0xf0c742, 0.62, 0.1);
    const softGoldMat = mat(0xffd95f, 0.54, 0.2);
    const orangeMat = mat(0xd8642c, 0.65, 0.02);

    const angel = new THREE.Group();
    scene.add(angel);

    const bodyRoot = new THREE.Group();
    angel.add(bodyRoot);

    const floatRoot = new THREE.Group();
    bodyRoot.add(floatRoot);

    const torso = new THREE.Mesh(new THREE.SphereGeometry(0.95, 36, 28), whiteMat);
    torso.scale.set(0.95, 1.15, 0.8);
    torso.position.set(0, 0.55, 0);
    torso.castShadow = true;
    floatRoot.add(torso);

    const waist = new THREE.Mesh(new THREE.TorusGeometry(0.58, 0.11, 20, 60), goldMat);
    waist.rotation.x = Math.PI / 2;
    waist.position.set(0, 0.08, 0.02);
    waist.castShadow = true;
    floatRoot.add(waist);

    const skirt = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 1.22, 1.15, 8, 1, true), whiteMat);
    skirt.position.set(0, -0.55, 0);
    skirt.castShadow = true;
    floatRoot.add(skirt);

    const skirtBottom = new THREE.Mesh(new THREE.TorusGeometry(1.0, 0.13, 20, 60), whiteMat);
    skirtBottom.scale.y = 0.72;
    skirtBottom.rotation.x = Math.PI / 2;
    skirtBottom.position.set(0, -1.1, 0);
    skirtBottom.castShadow = true;
    floatRoot.add(skirtBottom);

    const chestGold = new THREE.Mesh(new THREE.OctahedronGeometry(0.22), goldMat);
    chestGold.position.set(0, 0.56, 0.72);
    chestGold.scale.set(1.0, 0.75, 0.35);
    chestGold.castShadow = true;
    floatRoot.add(chestGold);

    const lowerGold = new THREE.Mesh(new THREE.OctahedronGeometry(0.22), goldMat);
    lowerGold.position.set(0, 0.08, 0.7);
    lowerGold.scale.set(1.05, 0.75, 0.35);
    lowerGold.castShadow = true;
    floatRoot.add(lowerGold);

    const bowLeft = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.35, 4), goldMat);
    bowLeft.position.set(-0.18, 0.1, 0.72);
    bowLeft.rotation.z = Math.PI / 4;
    bowLeft.rotation.x = Math.PI / 2.2;
    bowLeft.castShadow = true;
    floatRoot.add(bowLeft);

    const bowRight = bowLeft.clone();
    bowRight.position.x *= -1;
    bowRight.rotation.z *= -1;
    floatRoot.add(bowRight);

    const headGroup = new THREE.Group();
    headGroup.position.set(0, 1.95, 0.04);
    floatRoot.add(headGroup);

    const head = new THREE.Mesh(new THREE.SphereGeometry(1.26, 42, 36), skinMat);
    head.scale.set(1.06, 1.0, 1.0);
    head.castShadow = true;
    headGroup.add(head);

    const bangs = new THREE.Group();
    headGroup.add(bangs);
    for (let i = -3; i <= 3; i++) {
      const piece = new THREE.Mesh(new THREE.CapsuleGeometry(0.13, 0.65, 5, 10), hairMat);
      piece.position.set(i * 0.22, 0.12 - Math.abs(i) * 0.035, 1.02);
      piece.rotation.z = i * 0.1;
      piece.rotation.x = 0.18;
      piece.castShadow = true;
      bangs.add(piece);
    }

    const hairBack = new THREE.Mesh(new THREE.SphereGeometry(1.34, 36, 28), hairMat);
    hairBack.scale.set(1.0, 1.1, 0.92);
    hairBack.position.set(0, -0.02, -0.2);
    hairBack.castShadow = true;
    headGroup.add(hairBack);

    function createHairStrand(side = 1) {
      const strand = new THREE.Group();
      const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.16, 1.0, 5, 12), hairMat);
      upper.rotation.z = -0.32 * side;
      upper.position.set(0.42 * side, -0.74, 0.18);
      upper.castShadow = true;
      strand.add(upper);

      const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 1.35, 5, 12), hairMat);
      lower.rotation.z = -0.85 * side;
      lower.position.set(0.92 * side, -1.45, 0.12);
      lower.castShadow = true;
      strand.add(lower);
      return strand;
    }

    headGroup.add(createHairStrand(-1));
    headGroup.add(createHairStrand(1));

    const eyeGeo = new THREE.SphereGeometry(0.24, 18, 16);
    const eyeL = new THREE.Mesh(eyeGeo, blueMat);
    eyeL.scale.set(0.85, 1.28, 0.32);
    eyeL.position.set(-0.38, -0.06, 1.02);
    headGroup.add(eyeL);

    const eyeR = eyeL.clone();
    eyeR.position.x *= -1;
    headGroup.add(eyeR);

    const pupilMat = mat(0x173a9f, 0.2, 0.05);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 14, 12), pupilMat);
    pupilL.scale.set(1, 1.6, 0.26);
    pupilL.position.set(-0.39, -0.08, 1.18);
    headGroup.add(pupilL);
    const pupilR = pupilL.clone();
    pupilR.position.x *= -1;
    headGroup.add(pupilR);

    const eyeSparkMat = mat(0xffffff, 0.15, 0.0);
    const sparkL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 10), eyeSparkMat);
    sparkL.position.set(-0.31, 0.03, 1.2);
    headGroup.add(sparkL);
    const sparkR = sparkL.clone();
    sparkR.position.x *= -1;
    headGroup.add(sparkR);

    const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.05, 10, 24, Math.PI), orangeMat);
    mouth.rotation.z = Math.PI;
    mouth.position.set(0, -0.48, 1.05);
    headGroup.add(mouth);

    const tiara = new THREE.Group();
    tiara.position.set(0, 0.72, 0.55);
    headGroup.add(tiara);
    for (let i = -4; i <= 4; i++) {
      const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), goldMat);
      leaf.scale.set(0.62, 1.25, 0.28);
      const angle = i * 0.19;
      leaf.position.set(Math.sin(angle) * 0.92, Math.cos(angle) * 0.02, 0);
      leaf.rotation.z = angle;
      leaf.castShadow = true;
      tiara.add(leaf);
    }

    const gemFrame = new THREE.Mesh(new THREE.OctahedronGeometry(0.22), goldMat);
    gemFrame.position.set(0, 0.02, 0.03);
    gemFrame.scale.set(1.0, 1.0, 0.45);
    tiara.add(gemFrame);

    const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.15), blueMat);
    gem.position.set(0, 0.02, 0.12);
    gem.scale.set(1.0, 1.0, 0.4);
    tiara.add(gem);

    function createWing(side = 1) {
      const wing = new THREE.Group();
      wing.position.set(1.15 * side, 0.65, -0.55);
      wing.rotation.y = -0.35 * side;
      wing.rotation.z = 0.24 * side;

      const featherMat = whiteMat;
      const sizes = [0.62, 0.56, 0.5, 0.46];
      sizes.forEach((size, idx) => {
        const feather = new THREE.Mesh(new THREE.SphereGeometry(size, 18, 14), featherMat);
        feather.scale.set(0.5, 1.22, 0.18);
        feather.position.set(0.36 * idx, -0.18 * idx, 0);
        feather.rotation.z = (0.38 + idx * 0.08) * side;
        feather.castShadow = true;
        wing.add(feather);
      });

      const topFeathers = [0.42, 0.38, 0.34];
      topFeathers.forEach((size, idx) => {
        const feather = new THREE.Mesh(new THREE.SphereGeometry(size, 18, 14), featherMat);
        feather.scale.set(0.42, 1.0, 0.18);
        feather.position.set(0.18 * idx, 0.32 + 0.12 * idx, -0.02);
        feather.rotation.z = (-0.18 - idx * 0.12) * side;
        feather.castShadow = true;
        wing.add(feather);
      });

      return wing;
    }

    floatRoot.add(createWing(-1));
    floatRoot.add(createWing(1));

    function createArm(side = 1, raised = false) {
      const arm = new THREE.Group();
      arm.position.set(0.86 * side, 1.0, 0);
      arm.rotation.z = raised ? (-1.08 * side) : (0.35 * side);
      arm.rotation.x = raised ? -0.18 : 0.18;

      const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.16, 0.58, 5, 10), skinMat);
      upper.position.set(0.22 * side, 0.08, 0);
      upper.castShadow = true;
      arm.add(upper);

      const band = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.04, 10, 20), goldMat);
      band.rotation.y = Math.PI / 2;
      band.position.set(0.22 * side, -0.18, 0);
      arm.add(band);

      const fore = new THREE.Group();
      fore.position.set(0.45 * side, 0.35, 0);
      fore.rotation.z = raised ? 0.25 * side : 0.2 * side;
      arm.add(fore);

      const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.14, 0.56, 5, 10), skinMat);
      lower.position.set(0.16 * side, 0.04, 0);
      lower.castShadow = true;
      fore.add(lower);

      const wristBand = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.035, 10, 20), goldMat);
      wristBand.rotation.y = Math.PI / 2;
      wristBand.position.set(0.33 * side, -0.18, 0);
      fore.add(wristBand);

      const hand = new THREE.Mesh(new THREE.SphereGeometry(0.17, 16, 16), skinMat);
      hand.scale.set(0.9, 1.0, 0.72);
      hand.position.set(0.45 * side, 0.22, 0);
      hand.castShadow = true;
      fore.add(hand);

      return arm;
    }

    const leftArm = createArm(-1, true);
    const rightArm = createArm(1, false);
    floatRoot.add(leftArm);
    floatRoot.add(rightArm);

    function createLeg(side = 1, bent = false) {
      const leg = new THREE.Group();
      leg.position.set(0.36 * side, -1.05, 0.05);
      leg.rotation.z = bent ? (-0.28 * side) : (0.08 * side);

      const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.18, 0.7, 5, 10), skinMat);
      thigh.position.set(0, -0.38, 0);
      thigh.castShadow = true;
      leg.add(thigh);

      const shinGroup = new THREE.Group();
      shinGroup.position.set(0, -0.83, 0.02);
      shinGroup.rotation.z = bent ? (0.72 * side) : 0.1 * side;
      leg.add(shinGroup);

      const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 0.65, 5, 10), skinMat);
      shin.position.set(0.02 * side, -0.22, 0);
      shin.castShadow = true;
      shinGroup.add(shin);

      const ankleBand = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.035, 10, 20), goldMat);
      ankleBand.rotation.x = Math.PI / 2;
      ankleBand.position.set(0.04 * side, -0.57, 0);
      shinGroup.add(ankleBand);

      const shoe = new THREE.Mesh(new THREE.CapsuleGeometry(0.18, 0.35, 5, 10), blackMat);
      shoe.scale.set(1.1, 0.62, 1.65);
      shoe.rotation.z = Math.PI / 2;
      shoe.position.set(0.08 * side, -0.78, 0.16);
      shoe.castShadow = true;
      shinGroup.add(shoe);

      const toe = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), skinMat);
      toe.scale.set(1.35, 0.55, 0.7);
      toe.position.set(0.1 * side, -0.75, 0.34);
      toe.castShadow = true;
      shinGroup.add(toe);

      return leg;
    }

    floatRoot.add(createLeg(-1, false));
    floatRoot.add(createLeg(1, true));

    function createStaff() {
      const g = new THREE.Group();
      g.position.set(2.0, 0.46, 0.2);
      g.rotation.z = -0.18;

      const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3.2, 18), blackMat);
      shaft.castShadow = true;
      g.add(shaft);

      const ring1 = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.03, 10, 20), goldMat);
      ring1.rotation.x = Math.PI / 2;
      ring1.position.y = 1.04;
      g.add(ring1);

      const ring2 = ring1.clone();
      ring2.position.y = -1.06;
      g.add(ring2);

      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.28, 18, 16), softGoldMat);
      orb.position.y = 1.67;
      orb.castShadow = true;
      g.add(orb);

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.38, 18, 16),
        new THREE.MeshBasicMaterial({ color: 0xffef9b, transparent: true, opacity: 0.2 })
      );
      glow.position.copy(orb.position);
      g.add(glow);

      const light = new THREE.PointLight(0xffdc69, 14, 4, 2);
      light.position.copy(orb.position);
      g.add(light);

      for (let i = 0; i < 3; i++) {
        const wing = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), goldMat);
        wing.scale.set(0.55, 1.25, 0.18);
        wing.position.set((i - 1) * 0.24, 1.38, 0);
        wing.rotation.z = (i - 1) * 0.45;
        wing.castShadow = true;
        g.add(wing);
      }

      const base = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.34, 6), goldMat);
      base.position.y = -1.76;
      base.castShadow = true;
      g.add(base);

      return g;
    }

    const staff = createStaff();
    floatRoot.add(staff);

    function createWreath() {
      const g = new THREE.Group();
      g.position.set(-1.42, 2.95, 0.14);
      g.rotation.z = -0.5;
      const radius = 0.72;
      for (let i = 0; i < 15; i++) {
        const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), goldMat);
        leaf.scale.set(0.52, 1.18, 0.22);
        const a = (i / 15) * Math.PI * 2;
        leaf.position.set(Math.cos(a) * radius, Math.sin(a) * radius, 0);
        leaf.rotation.z = a + Math.PI / 2;
        leaf.castShadow = true;
        g.add(leaf);
      }
      return g;
    }

    const wreath = createWreath();
    floatRoot.add(wreath);

    const starField = new THREE.Group();
    scene.add(starField);
    const starGeo = new THREE.SphereGeometry(0.03, 8, 8);
    for (let i = 0; i < 140; i++) {
      const s = new THREE.Mesh(starGeo, new THREE.MeshBasicMaterial({ color: i % 4 === 0 ? 0xffefb0 : 0xffffff }));
      s.position.set(
        (Math.random() - 0.5) * 20,
        (Math.random() - 0.1) * 14,
        -6 - Math.random() * 8
      );
      s.scale.multiplyScalar(0.6 + Math.random() * 2.2);
      starField.add(s);
    }

    const petalGeo = new THREE.SphereGeometry(0.12, 10, 10);
    const petals = [];
    for (let i = 0; i < 16; i++) {
      const p = new THREE.Mesh(petalGeo, new THREE.MeshStandardMaterial({ color: 0xffea72, roughness: 0.45, metalness: 0.08 }));
      p.scale.set(0.55, 1.0, 0.22);
      p.position.set((Math.random() - 0.5) * 6.5, -1.8 + Math.random() * 6, -1.5 + Math.random() * 2);
      p.rotation.z = Math.random() * Math.PI;
      p.castShadow = true;
      scene.add(p);
      petals.push({ mesh: p, speed: 0.002 + Math.random() * 0.004, offset: Math.random() * Math.PI * 2 });
    }

    angel.position.y = 0.2;

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      controls.update();

      floatRoot.position.y = Math.sin(t * 1.6) * 0.12;
      headGroup.rotation.z = Math.sin(t * 1.4) * 0.02;
      headGroup.rotation.x = Math.sin(t * 1.2) * 0.03;
      const wingFlap = Math.sin(t * 4.2) * 0.08;
      floatRoot.children.forEach(obj => {
        if (obj !== staff && obj !== wreath && obj !== headGroup) {
          // noop placeholder
        }
      });
      const wings = floatRoot.children.filter(o => o.type === 'Group' && o.children.length >= 6 && o !== headGroup && o !== staff && o !== wreath);
      if (wings[0]) wings[0].rotation.z = -0.24 + wingFlap;
      if (wings[1]) wings[1].rotation.z = 0.24 - wingFlap;

      staff.rotation.z = -0.18 + Math.sin(t * 1.3) * 0.03;
      wreath.rotation.z = -0.5 + Math.sin(t * 1.5) * 0.08;

      petals.forEach((item, idx) => {
        item.mesh.position.y += item.speed;
        item.mesh.position.x += Math.sin(t + item.offset + idx) * 0.0025;
        item.mesh.rotation.z += item.speed * 4;
        if (item.mesh.position.y > 4.6) {
          item.mesh.position.y = -3.2;
          item.mesh.position.x = (Math.random() - 0.5) * 6.5;
        }
      });

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
